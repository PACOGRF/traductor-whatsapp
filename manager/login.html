<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatLink — Acceso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1E3B2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #1E3B2E;
      letter-spacing: -1px;
    }

    .login-logo p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1E3B2E; }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: #1E3B2E;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .login-btn:hover { background: #2d5a42; }
    .login-btn:disabled { background: #aaa; cursor: not-allowed; }

    .error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.2rem;
    }

    .remember-note {
      text-align: center;
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>ChatLink</h1>
      <p id="company-subtitle">Panel del gestor</p>
    </div>

    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="gestor" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="error-msg" id="error-msg"></div>

    <p class="remember-note">Tu sesión se mantendrá activa 30 días en este dispositivo.</p>
  </div>

  <script>
    // Si ya hay token válido, ir directo al panel
    const token = localStorage.getItem('chatlink_token');
    if (token) window.location.href = '/';

    // Cargar nombre de empresa desde config.js
    fetch('/config.js').then(r => r.text()).then(js => {
      eval(js);
      if (window.CHATLINK_COMPANY_NAME) {
        document.getElementById('company-subtitle').textContent = 'Panel del gestor — ' + window.CHATLINK_COMPANY_NAME;
      }
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');

      if (!username || !password) {
        errorMsg.textContent = 'Introduce usuario y contraseña';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando…';
      errorMsg.textContent = '';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          const { token } = await res.json();
          localStorage.setItem('chatlink_token', token);
          window.location.href = '/';
        } else {
          const { error } = await res.json();
          errorMsg.textContent = error || 'Error al iniciar sesión';
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch {
        errorMsg.textContent = 'Error de conexión. Inténtalo de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
