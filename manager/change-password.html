<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatLink — Cambiar contraseña</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1E3B2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .login-logo { text-align: center; margin-bottom: 1.5rem; }

    .login-logo h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #1E3B2E;
      letter-spacing: -1px;
    }

    .login-logo p { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }

    .info-note {
      background: #fff8e1;
      border: 1px solid #f0d47a;
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      font-size: 0.82rem;
      color: #7a5c00;
      margin-bottom: 1.25rem;
    }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1E3B2E; }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: #1E3B2E;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .login-btn:hover { background: #2d5a42; }
    .login-btn:disabled { background: #aaa; cursor: not-allowed; }

    .error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>ChatLink</h1>
      <p>Cambio de contraseña</p>
    </div>

    <div class="info-note">
      🔐 Por seguridad, debes crear tu propia contraseña antes de empezar a usar el panel.
    </div>

    <div class="form-group">
      <label for="current-password">Contraseña actual (temporal)</label>
      <input type="password" id="current-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="form-group">
      <label for="new-password">Nueva contraseña (mínimo 8 caracteres)</label>
      <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <div class="form-group">
      <label for="repeat-password">Repite la nueva contraseña</label>
      <input type="password" id="repeat-password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button class="login-btn" id="change-btn">Guardar contraseña</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script>
    // Sin token no se puede estar aquí: volver al login
    const token = localStorage.getItem('chatlink_token');
    if (!token) window.location.href = '/login.html';

    async function doChange() {
      const current = document.getElementById('current-password').value;
      const nueva   = document.getElementById('new-password').value;
      const repite  = document.getElementById('repeat-password').value;
      const btn      = document.getElementById('change-btn');
      const errorMsg = document.getElementById('error-msg');

      errorMsg.textContent = '';

      if (!current || !nueva || !repite) {
        errorMsg.textContent = 'Rellena todos los campos';
        return;
      }
      if (nueva.length < 8) {
        errorMsg.textContent = 'La nueva contraseña debe tener al menos 8 caracteres';
        return;
      }
      if (nueva !== repite) {
        errorMsg.textContent = 'Las contraseñas nuevas no coinciden';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Guardando…';

      try {
        const res = await fetch('/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ current_password: current, new_password: nueva }),
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('chatlink_token', data.token);
          window.location.href = '/';
        } else {
          const { error } = await res.json();
          errorMsg.textContent = error || 'No se pudo cambiar la contraseña';
          btn.disabled = false;
          btn.textContent = 'Guardar contraseña';
        }
      } catch {
        errorMsg.textContent = 'Error de conexión. Inténtalo de nuevo.';
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
      }
    }

    document.getElementById('change-btn').addEventListener('click', doChange);
    document.getElementById('repeat-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doChange();
    });
  </script>
</body>
</html>
